<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something to be Found</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sacramento&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <img src="/static/img/logo.webp" alt="Something to be Found" class="nav-logo">
        </a>
        <div class="nav-links">
            <a href="/dashboard" class="{% if active == 'dashboard' %}active{% endif %}">
                <span class="nav-icon">📊</span> Dashboard
            </a>
            <a href="/" class="{% if active == 'upload' %}active{% endif %}">
                <span class="nav-icon">📸</span> Upload
            </a>
            <a href="/review" class="{% if active == 'review' %}active{% endif %}">
                <span class="nav-icon">✏️</span> Review
            </a>
            <a href="/published" class="{% if active == 'published' %}active{% endif %}">
                <span class="nav-icon">✅</span> Published
            </a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
